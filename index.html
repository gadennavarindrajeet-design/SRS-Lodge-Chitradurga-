<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LodgeEase - Management System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="app">
        <nav class="sidebar">
            <div class="logo">
                <i class="fas fa-hotel"></i>
                <span>LodgeEase</span>
            </div>
            <ul class="nav-menu">
                <li class="active" data-page="dashboard"><i class="fas fa-th-large"></i> <span>Dashboard</span></li>
                <li data-page="checkin"><i class="fas fa-user-plus"></i> <span>Check-In</span></li>
                <li data-page="checkout"><i class="fas fa-sign-out-alt"></i> <span>Check-Out</span></li>
                <li data-page="history"><i class="fas fa-list"></i> <span>History</span></li>
            </ul>
        </nav>

        <main class="content">
            <!-- Dashboard -->
            <section id="dashboard" class="page active">
                <header>
                    <h1>Dashboard</h1>
                    <p id="date-display"></p>
                </header>
                <div class="stats">
                    <div class="stat-card">
                        <i class="fas fa-users"></i>
                        <div>
                            <h3 id="stat-customers">0</h3>
                            <p>Today's Guests</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-indian-rupee-sign"></i>
                        <div>
                            <h3 id="stat-income">₹0</h3>
                            <p>Today's Income</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-bed"></i>
                        <div>
                            <h3 id="stat-occupied">0</h3>
                            <p>Rooms Occupied</p>
                        </div>
                    </div>
                </div>
                <div class="recent">
                    <h2>Active Guests</h2>
                    <div class="table-wrapper">
                        <table id="active-table">
                            <thead>
                                <tr>
                                    <th>Room</th>
                                    <th>Guest</th>
                                    <th>Phone</th>
                                    <th>Check-In</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- Check-In -->
            <section id="checkin" class="page">
                <header><h1>Guest Check-In</h1></header>
                <form id="checkin-form" class="card">
                    <div class="form-grid">
                        <div class="field">
                            <label>Guest Name</label>
                            <input type="text" id="in-name" required>
                        </div>
                        <div class="field">
                            <label>Phone Number</label>
                            <input type="tel" id="in-phone" required>
                        </div>
                        <div class="field">
                            <label>Aadhaar Number</label>
                            <input type="text" id="in-aadhaar" required>
                        </div>
                        <div class="field">
                            <label>Room Number</label>
                            <input type="text" id="in-room" required>
                        </div>
                        <div class="field full">
                            <label>Address</label>
                            <textarea id="in-address" required></textarea>
                        </div>
                        <div class="field">
                            <label>Amount Paid (Advance)</label>
                            <input type="number" id="in-paid" required>
                        </div>
                        <div class="field">
                            <label>Room Price (Per Day)</label>
                            <input type="number" id="in-price" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Check-In Guest</button>
                </form>
            </section>

            <!-- Check-Out -->
            <section id="checkout" class="page">
                <header><h1>Guest Check-Out</h1></header>
                <div id="checkout-list" class="grid"></div>
            </section>

            <!-- History -->
            <section id="history" class="page">
                <header><h1>Customer History</h1></header>
                <div class="table-wrapper">
                    <table id="history-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Guest</th>
                                <th>Room</th>
                                <th>Stay</th>
                                <th>Total</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Receipt Modal -->
    <div id="receipt-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="receipt-body"></div>
            <button id="download-pdf" class="btn-primary">Download PDF</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
